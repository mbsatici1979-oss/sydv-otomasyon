<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>İhale Onay · Doğrudan Temin</title>
  <link rel="stylesheet" href="/dogrudan-temin/sonraki-asamalar.css">
</head>
<body>
  <header class="header"><div class="header-row"><div class="brand"><div class="brand-icon"><svg width="29" height="29" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M5 3h10l4 4v14H5z"/><path d="M14 3v5h5M8 12h8M8 16h6"/></svg></div><div><h1>Doğrudan Temin İşlemleri</h1><p>Satın alma süreç yönetimi</p></div></div><span class="header-badge" id="headerBadge">İhale Onay</span></div></header>
  <nav class="stepbar" id="stepbar" aria-label="Doğrudan temin aşamaları"></nav>
  <main class="wrap"><section class="intro"><div><p class="eyebrow" id="pageEyebrow"></p><h2 id="pageTitle"></h2><p id="pageIntro"></p></div><button class="primary" id="newRecord"></button></section><section class="stats"><article class="stat"><span id="stat1Label"></span><strong id="stat1">0</strong></article><article class="stat"><span id="stat2Label"></span><strong id="stat2">0</strong></article><article class="stat"><span id="stat3Label"></span><strong id="stat3">₺0,00</strong></article></section><section class="list-card"><div class="list-toolbar"><input class="search" id="search" placeholder="Belge no, işin adı veya firma ara…"><span id="resultText" style="color:var(--muted);font-size:11px"></span></div><div id="recordList"></div><div class="empty" id="empty"></div></section></main>
  <section class="editor" id="editor" hidden><header class="editor-top"><div class="editor-title"><strong id="editorTitle"></strong><small id="editorHelp"></small></div><div class="editor-actions"><button class="secondary" id="cancelEdit" type="button">Vazgeç</button><button class="secondary" id="printEdit" type="button">Önizle / Yazdır</button><button class="primary" id="saveEdit" type="button">Kaydet</button></div></header><form class="form-wrap" id="form"></form></section>
  <section class="print-sheet" id="printSheet"></section>
  <script>window.DT_PAGE='onay';</script>
  <script src="/dogrudan-temin/sonraki-asamalar.js"></script>
</body>
</html>
