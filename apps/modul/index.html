<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>SYDV İşlem Modülü</title>
  <style>
    :root{--navy:#123e56;--deep:#0b2b3d;--teal:#128982;--bg:#eef3f5;--line:#d6e1e5;--text:#193440;--muted:#6b7f88;--danger:#b44048;--shadow:0 16px 42px rgba(16,53,71,.1)}*{box-sizing:border-box}body{margin:0;color:var(--text);background:var(--bg);font-family:Inter,"Segoe UI",system-ui,sans-serif}button,input,select,textarea{font:inherit}button{cursor:pointer}[hidden]{display:none!important}
    .header{display:flex;align-items:center;justify-content:space-between;gap:20px;padding:25px clamp(18px,4vw,50px);color:#fff;background:linear-gradient(115deg,var(--deep),var(--navy))}.header h1{margin:0;font-size:clamp(23px,3vw,32px);letter-spacing:-.03em}.header p{margin:6px 0 0;color:#bad0d9;font-size:13px}.header-icon{width:54px;height:54px;display:grid;place-items:center;flex:none;border:1px solid rgba(255,255,255,.17);border-radius:16px;background:rgba(255,255,255,.09);color:#9de2da}.wrap{width:min(1250px,calc(100% - 30px));margin:0 auto;padding:26px 0 44px}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:13px;margin-bottom:19px}.stat{padding:16px 18px;border:1px solid var(--line);border-radius:13px;background:#fff;box-shadow:0 8px 23px rgba(16,53,71,.06)}.stat span,.stat strong{display:block}.stat span{color:var(--muted);font-size:11px;font-weight:750;text-transform:uppercase;letter-spacing:.07em}.stat strong{margin-top:4px;color:var(--navy);font-size:24px}.toolbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:13px}.search{width:min(360px,100%);height:43px;padding:0 13px;border:1px solid #cbd9dd;border-radius:10px;background:#fff;outline:none}.search:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(18,137,130,.1)}.primary{height:43px;padding:0 16px;color:#fff;border:0;border-radius:10px;background:var(--teal);font-weight:800}.primary:hover{background:#0c6c68}.secondary{height:42px;padding:0 14px;color:var(--text);border:1px solid #cbd8dc;border-radius:9px;background:#fff;font-weight:750}.table-shell{overflow:auto;border:1px solid var(--line);border-radius:14px;background:#fff;box-shadow:var(--shadow)}table{width:100%;border-collapse:collapse;white-space:nowrap}th,td{padding:13px 14px;border-bottom:1px solid #e5ecee;text-align:left;font-size:13px}th{color:#5c747f;background:#f7f9fa;font-size:11px;text-transform:uppercase;letter-spacing:.04em}tbody tr:hover{background:#f5faf9}tbody tr:last-child td{border-bottom:0}.badge{display:inline-flex;padding:5px 8px;border-radius:999px;color:#416974;background:#eaf1f3;font-size:10px;font-weight:850}.badge.good{color:#23715b;background:#dcf2e8}.badge.warn{color:#8a6119;background:#fff0d3}.row-actions{display:flex;gap:6px}.icon-button{height:32px;padding:0 9px;border:1px solid #d5e0e3;border-radius:8px;background:#fff;font-size:11px;font-weight:750}.icon-button.danger{color:var(--danger)}.empty{padding:55px 20px;text-align:center;color:var(--muted)}
    .modal{position:fixed;inset:0;z-index:5;display:grid;place-items:center;padding:16px;background:rgba(6,29,40,.55);backdrop-filter:blur(3px)}.dialog{width:min(750px,100%);max-height:calc(100vh - 32px);overflow:auto;border-radius:18px;background:#fff;box-shadow:0 28px 80px rgba(0,0,0,.26)}.dialog-head{position:sticky;top:0;z-index:2;display:flex;align-items:center;justify-content:space-between;padding:19px 22px;border-bottom:1px solid var(--line);background:#fff}.dialog-head h2{margin:0;font-size:19px}.close{width:36px;height:36px;border:0;border-radius:9px;background:#edf3f4;font-size:22px}.dialog-body{padding:21px}.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:0 13px}.field{display:grid;gap:6px;margin-bottom:15px}.field.full{grid-column:1/-1}.field label{font-size:12px;font-weight:800}.field input,.field select,.field textarea{width:100%;min-height:44px;padding:10px 12px;color:var(--text);border:1px solid #cbd9dd;border-radius:9px;outline:none}.field textarea{min-height:86px;resize:vertical}.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(18,137,130,.1)}.dialog-actions{display:flex;justify-content:flex-end;gap:9px}.error{min-height:20px;margin:0 0 8px;color:var(--danger);font-size:12px}
    @media(max-width:650px){.header{padding:18px}.header-icon{display:none}.stats{grid-template-columns:1fr}.toolbar{align-items:stretch;flex-direction:column}.search{width:100%}.form-grid{grid-template-columns:1fr}.field.full{grid-column:auto}}
  </style>
</head>
<body>
  <header class="header"><div><h1 id="pageTitle">İşlem Modülü</h1><p id="pageSubtitle"></p></div><div class="header-icon"><svg id="headerSvg" width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"></svg></div></header>
  <main class="wrap"><section class="stats"><article class="stat"><span>Toplam Kayıt</span><strong id="totalStat">0</strong></article><article class="stat"><span id="secondStatLabel">Aktif</span><strong id="secondStat">0</strong></article><article class="stat"><span>Bu Ay Eklenen</span><strong id="monthStat">0</strong></article></section><div class="toolbar"><input class="search" id="searchInput" placeholder="Kayıtlarda ara…"><button class="primary" id="newButton">+ Yeni Kayıt</button></div><section class="table-shell"><table><thead><tr id="tableHead"></tr></thead><tbody id="tableBody"></tbody></table><div class="empty" id="empty" hidden>Henüz kayıt bulunmuyor. İlk kaydı eklemek için “Yeni Kayıt” düğmesini kullanın.</div></section></main>
  <div class="modal" id="modal" hidden><form class="dialog" id="recordForm"><header class="dialog-head"><h2 id="dialogTitle">Yeni Kayıt</h2><button class="close" id="closeButton" type="button">×</button></header><div class="dialog-body"><input id="recordId" type="hidden"><div class="form-grid" id="formFields"></div><p class="error" id="formError"></p><div class="dialog-actions"><button class="secondary" id="cancelButton" type="button">Vazgeç</button><button class="primary" type="submit">Kaydet</button></div></div></form></div>
  <script>
    const configs={
      asevi:{title:'Aşevi İş ve İşlemleri',subtitle:'Üretim, teslim ve yemek dağıtım kayıtları',icon:'<path d="M4 11h16M6 11c0-4 2.7-7 6-7s6 3 6 7M3 11h18l-2 9H5z"/><path d="M12 4V2"/>',statusKey:'status',activeValues:['Hazırlanıyor','Dağıtımda'],activeLabel:'Devam Eden',fields:[{key:'date',label:'İşlem Tarihi',type:'date',required:true},{key:'operation',label:'İşlem Türü',type:'select',required:true,options:['Yemek Üretimi','Yemek Dağıtımı','Malzeme Girişi','Bağış / Teslim']},{key:'description',label:'Açıklama / Menü',required:true},{key:'beneficiary',label:'Teslim Yeri / Kişi'},{key:'quantity',label:'Miktar / Porsiyon',type:'number',required:true},{key:'status',label:'Durum',type:'select',options:['Hazırlanıyor','Dağıtımda','Tamamlandı','İptal']},{key:'notes',label:'Notlar',type:'textarea',full:true}],columns:['date','operation','description','beneficiary','quantity','status']},
      dogrudanTemin:{title:'Doğrudan Temin İşlemleri',subtitle:'Alım talepleri, teklifler ve tedarik süreci',icon:'<path d="M4 7h16v13H4zM8 7V4h8v3M4 12h16M10 12v2h4v-2"/>',statusKey:'status',activeValues:['Talep Oluşturuldu','Teklif Toplanıyor','Onay Bekliyor'],activeLabel:'Devam Eden',fields:[{key:'date',label:'Talep Tarihi',type:'date',required:true},{key:'subject',label:'Alım Konusu',required:true},{key:'requester',label:'Talep Eden Birim / Kişi',required:true},{key:'supplier',label:'Tedarikçi'},{key:'amount',label:'Yaklaşık / Kesin Tutar',type:'number',step:'0.01'},{key:'status',label:'Süreç Durumu',type:'select',options:['Talep Oluşturuldu','Teklif Toplanıyor','Onay Bekliyor','Sipariş Verildi','Tamamlandı','İptal']},{key:'notes',label:'Açıklama ve Notlar',type:'textarea',full:true}],columns:['date','subject','requester','supplier','amount','status']},
      personel:{title:'Personel Görev Takip İşlemleri',subtitle:'Görev atama, termin ve tamamlanma takibi',icon:'<path d="M9 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8ZM2 21v-2a6 6 0 0 1 12 0v2M16 11l2 2 4-5"/>',statusKey:'status',activeValues:['Bekliyor','Devam Ediyor'],activeLabel:'Açık Görev',fields:[{key:'task',label:'Görev Konusu',required:true},{key:'assignedTo',label:'Görevlendirilen Personel',required:true},{key:'assignedDate',label:'Görev Tarihi',type:'date',required:true},{key:'dueDate',label:'Son Tarih',type:'date',required:true},{key:'priority',label:'Öncelik',type:'select',options:['Normal','Yüksek','Acil']},{key:'status',label:'Durum',type:'select',options:['Bekliyor','Devam Ediyor','Tamamlandı','İptal']},{key:'notes',label:'Görev Açıklaması',type:'textarea',full:true}],columns:['task','assignedTo','dueDate','priority','status']}
    };
    const type=new URLSearchParams(location.search).get('tip');const config=configs[type];let records=[];const $=s=>document.querySelector(s);
    if(!config){document.body.innerHTML='<div class="empty">Geçersiz modül.</div>';throw new Error('Geçersiz modül')}
    const labels=Object.fromEntries(config.fields.map(f=>[f.key,f.label]));
    function escapeHtml(v){return String(v??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}
    async function api(url,options={}){const r=await fetch(url,{...options,headers:{'Content-Type':'application/json'}});let d={};try{d=await r.json()}catch{}if(!r.ok){if(r.status===401)top.location.href='/';throw new Error(d.error||'İşlem tamamlanamadı.')}return d}
    function setup(){$('#pageTitle').textContent=config.title;$('#pageSubtitle').textContent=config.subtitle;$('#headerSvg').innerHTML=config.icon;$('#secondStatLabel').textContent=config.activeLabel;$('#tableHead').innerHTML=config.columns.map(k=>`<th>${labels[k]}</th>`).join('')+'<th>İşlemler</th>';$('#formFields').innerHTML=config.fields.map(field=>renderField(field)).join('');$('#newButton').onclick=()=>openForm();$('#closeButton').onclick=closeForm;$('#cancelButton').onclick=closeForm;$('#searchInput').oninput=render;$('#recordForm').onsubmit=saveRecord;$('#modal').onclick=e=>{if(e.target===$('#modal'))closeForm()};load()}
    function renderField(f){const attrs=`id="field-${f.key}" name="${f.key}" ${f.required?'required':''}`;let input;if(f.type==='select')input=`<select ${attrs}>${f.options.map(o=>`<option value="${escapeHtml(o)}">${escapeHtml(o)}</option>`).join('')}</select>`;else if(f.type==='textarea')input=`<textarea ${attrs}></textarea>`;else input=`<input ${attrs} type="${f.type||'text'}" ${f.step?`step="${f.step}"`:''}>`;return `<div class="field ${f.full?'full':''}"><label for="field-${f.key}">${f.label}${f.required?' *':''}</label>${input}</div>`}
    async function load(){try{const d=await api('/api/modules/'+type);records=d.records||[];render()}catch(err){$('#empty').hidden=false;$('#empty').textContent=err.message}}
    function render(){const query=$('#searchInput').value.toLocaleLowerCase('tr-TR');const filtered=records.filter(r=>Object.values(r).some(v=>String(v??'').toLocaleLowerCase('tr-TR').includes(query)));$('#tableBody').innerHTML=filtered.map(r=>`<tr>${config.columns.map(k=>`<td>${cellValue(k,r[k])}</td>`).join('')}<td><div class="row-actions"><button class="icon-button" onclick="editRecord('${r.id}')">Düzenle</button><button class="icon-button danger" onclick="deleteRecord('${r.id}')">Sil</button></div></td></tr>`).join('');$('#empty').hidden=filtered.length>0;$('#totalStat').textContent=records.length;$('#secondStat').textContent=records.filter(r=>config.activeValues.includes(r[config.statusKey])).length;const now=new Date();$('#monthStat').textContent=records.filter(r=>{const d=new Date(r.createdAt);return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear()}).length}
    function cellValue(key,value){if(key==='amount'&&value!==''&&value!=null)return Number(value).toLocaleString('tr-TR',{style:'currency',currency:'TRY'});if(key==='date'||key==='assignedDate'||key==='dueDate'){if(!value)return '—';return new Intl.DateTimeFormat('tr-TR').format(new Date(value+'T00:00:00'))}if(key==='status'||key==='priority'){const good=['Tamamlandı'].includes(value),warn=['Acil','Onay Bekliyor','Dağıtımda'].includes(value);return `<span class="badge ${good?'good':warn?'warn':''}">${escapeHtml(value||'—')}</span>`}return escapeHtml(value||'—')}
    function openForm(record=null){$('#recordForm').reset();$('#recordId').value=record?.id||'';$('#dialogTitle').textContent=record?'Kaydı Düzenle':'Yeni Kayıt';config.fields.forEach(f=>{const input=$('#field-'+f.key);if(record)input.value=record[f.key]??'';else if(f.type==='date')input.value=new Date().toISOString().slice(0,10)});$('#formError').textContent='';$('#modal').hidden=false}
    function closeForm(){$('#modal').hidden=true}window.editRecord=id=>{const record=records.find(r=>r.id===id);if(record)openForm(record)};
    window.deleteRecord=async id=>{if(!confirm('Bu kaydı silmek istediğinize emin misiniz?'))return;try{await api('/api/modules/'+type+'/'+id,{method:'DELETE'});await load()}catch(err){alert(err.message)}};
    async function saveRecord(e){e.preventDefault();const id=$('#recordId').value,payload={};config.fields.forEach(f=>payload[f.key]=$('#field-'+f.key).value);const button=e.submitter;button.disabled=true;try{await api('/api/modules/'+type+(id?'/'+id:''),{method:id?'PUT':'POST',body:JSON.stringify(payload)});closeForm();await load()}catch(err){$('#formError').textContent=err.message}finally{button.disabled=false}}
    setup();
  </script>
</body>
</html>
